<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Inspector</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 SEO Inspector</h1>
      <p class="subtitle">页面 SEO 诊断工具</p>
    </header>

    <div id="status" class="status"></div>

    <div class="main-layout">
      <!-- Left Tab Sidebar -->
      <nav class="tabs-sidebar">
        <button class="tab active" data-tab="content">📋 Content</button>
        <button class="tab" data-tab="indexability">🔗 Indexability</button>
        <button class="tab" data-tab="schema">📊 Schema Markup</button>
      </nav>

      <!-- Right Content Area -->
      <div class="content-area">
        <!-- Tab: Content -->
        <div id="tab-content" class="tab-panel active">
          <div id="content-fields" class="field-list"></div>
        </div>

        <!-- Tab: Indexability -->
        <div id="tab-indexability" class="tab-panel">
          <div id="indexability-fields" class="field-list"></div>
        </div>

        <!-- Tab: Schema Markup -->
        <div id="tab-schema" class="tab-panel">
          <div id="schema-list" class="schema-list"></div>
        </div>
      </div>
    </div>

    <footer>
      <button id="refresh" class="btn-refresh">🔄 刷新</button>
      <button id="tab-action" class="btn-action">📋 复制</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
